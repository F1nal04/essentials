tag:
  # Shown in chat messages, e.g. [Essentials]
  text: "Essentials"
  # Color names follow Minecraft's Formatting enum (case-insensitive), e.g. AQUA, DARK_GRAY, YELLOW
  color: "DARK_PURPLE"
  bracketColor: "DARK_GRAY"
  bold: true

back:
  # Time window during which /back can be used after a TPA teleport
  window_seconds: 120

backpack:
  # Mode: per_player | serverwide | ender_chest
  # per_player: each player has their own backpack
  # serverwide: all players share one backpack
  # ender_chest: the backpack opens the player's ender chest
  mode: "per_player"

tpa:
  # Timeout for a TPA/TPAHere request
  timeout_seconds: 60
  # Cooldown after cancelling a request before you can send another
  cooldown_seconds: 10

moderation:
  # Placeholders: {player}, {reason}, {moderator}, {time}, {expires_at}
  # Use & followed by a Minecraft formatting code (for example &c or &l).
  ban_message: "&cYou are banned from this server.\n&7Reason: &f{reason}\n&7Time remaining: &f{time}"
  # Placeholders: {player}, {reason}, {moderator}
  kick_message: "&cYou were kicked from this server.\n&7Reason: &f{reason}"
  # Placeholders: {player}, {reason}, {moderator}
  warning_message: "&eYou were warned by {moderator}: &f{reason}"
  # Placeholders: {player}, {reason}, {moderator}, {time}
  mute_message: "&cYou were muted by {moderator}. &7Reason: &f{reason} &7Duration: &f{time}"
  unmute_message: "&aYour mute was revoked by {moderator}."
  mute_blocked_message: "&cYou are muted. &7Reason: &f{reason} &7Time remaining: &f{time}"
  mute_expired_message: "&aYour mute has expired."
  mute_blocks_private_messages: true
  # Duration syntax: 30m, 2h, 7d, 4w, or combinations such as 1d12h.
  warning_rolling_period: "30d"
  warning_alert_threshold: 3

messaging:
  # Placeholders: {sender}, {recipient}, {message}. Use & formatting codes.
  # Private messages use white for "You", light purple for the other player,
  # dark purple for the arrow, and gray for the message body.
  incoming_format: "&8[&d{sender} &5-> &fYou&8] &7{message}"
  outgoing_format: "&8[&fYou &5-> &d{recipient}&8] &7{message}"
  reply_format: "&8[&fYou &5-> &d{recipient}&8] &7{message}"
  # Spy output intentionally uses only gray shades so it stays unobtrusive.
  spy_format: "&8[&7Spy&8] &7{sender} &8-> &7{recipient}&8: &7{message}"
  message_all_format: "&8[&5Announcement&8] &d{message}"
  ignored_player_format: "&c{recipient} is not accepting your private messages."
  unavailable_target_format: "&cThat player is offline or unavailable."
  missing_reply_target_format: "&cYou do not have anyone to reply to."
  # The staff bypass also requires essentials.msg.ignore.bypass (OP fallback).
  staff_bypasses_ignore: true
  console_bypasses_ignore: true

updates:
  # Check Modrinth once, asynchronously, after each server start.
  enabled: true
  # Channel: stable_only | include_prereleases
  channel: "stable_only"
  console_notifications: true
  player_notifications: true
  # Used when no permission provider supplies essentials.update.notify.
  op_fallback: true
  # Values outside these safe ranges are clamped (timeout: 2-30, delay: 0-300).
  request_timeout_seconds: 5
  startup_delay_seconds: 10
  # Placeholders: {installed_version}, {latest_version}, {channel}, {download_link}
  notification_text: "Update available: {installed_version} -> {latest_version} ({channel}). {download_link}"
  clickable_link: true

